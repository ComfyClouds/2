<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Comfy Clouds</title>
    <link rel="icon" href="https://www.dropbox.com/scl/fi/wrcs02gb97t13txourfa5/Comfy-Clouds-Website-Logo.png?rlkey=c3sg07goygyn6lexlrry71rbk&st=w7cbgvzw&raw=1" type="image/png" sizes="48x48">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --sky-blue: #64b5f6;
            --soft-pink: #f06292; 
            --text: #4a4a4a; 
        }

        body { 
            background: linear-gradient(-45deg, #e3f2fd, #fce4ec, #ffffff, #bbdefb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif; 
            color: var(--text); 
            margin: 0; padding: 0; 
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .success-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            padding: 50px 30px;
            border-radius: 50px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            animation: floatIn 1s ease-out;
        }

        @keyframes floatIn {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--sky-blue);
            font-size: 1.8rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .home-btn {
            display: inline-block;
            background: var(--sky-blue);
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(100, 181, 246, 0.3);
        }

        .home-btn:hover {
            background: var(--soft-pink);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(240, 98, 142, 0.3);
        }

        .cloud-dec {
            position: absolute;
            font-size: 3rem;
            opacity: 0.2;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <span class="icon">🌩️</span>
        <h1>Order Placed!</h1>
        <p>Thank you for choosing Comfy Clouds.<br>We have received your order and will contact you shortly via Whatsapp to confirm delivery within 2 days if we don't reach you, your order will be canceled within a week.<br>We appreciate your understanding</p>
        
        <a href="../main/" class="home-btn">Keep Shopping</a>
        
        <div class="cloud-dec" style="top: -20px; left: -20px;">☁️</div>
        <div class="cloud-dec" style="bottom: -20px; right: -20px;">☁️</div>
    </div>

</body>

</html>
