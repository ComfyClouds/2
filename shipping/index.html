<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping & Delivery | Comfy Clouds</title>
    <link rel="icon" href="https://www.dropbox.com/scl/fi/a4gedt72jx79fcad88ryj/Loogoo-website.png?rlkey=774oi4t7o75sjnnth8sbgaqor&st=qw4rlnfp&raw=1" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(-45deg, #e3f2fd, #fce4ec, #ffffff, #bbdefb);
            background-size: 400% 400%;
            font-family: 'Poppins', sans-serif; 
            color: #4a4a4a; 
            margin: 0; padding: 40px 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .policy-container {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 { 
            font-family: 'Montserrat', sans-serif; 
            text-transform: uppercase; 
            color: #64b5f6;
            margin-bottom: 30px;
        }
        .rate-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            padding: 20px 25px;
            border-radius: 20px;
            margin-bottom: 15px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .rate-card:hover { transform: scale(1.02); background: white; }
        .city-info { text-align: left; }
        .city-name { font-weight: 700; display: block; color: #4a4a4a; }
        .days { font-size: 0.8rem; color: #888; }
        .price { font-weight: 700; color: #f06292; font-size: 1.1rem; }
        
        .contact-box { 
            margin-top: 40px; 
            padding-top: 20px; 
            border-top: 1px solid rgba(255,255,255,0.5);
        }
        .wa-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.3s;
        }
        .wa-link:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }
        .back-home {
            display: block; text-align: center; margin-top: 30px;
            color: #aaa; text-decoration: none; font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="policy-container">
    <span style="font-size: 0.8rem; letter-spacing: 2px; color: #aaa; text-transform: uppercase;">Comfy Clouds</span>
    <h1>Delivery & Shipping</h1>

    <div class="rate-card">
        <div class="city-info">
            <span class="city-name">Cairo</span>
            <span class="days">3-4 Business Days</span>
        </div>
        <span class="price">35 EGP</span>
    </div>

    <div class="rate-card">
        <div class="city-info">
            <span class="city-name">Giza</span>
            <span class="days">4-5 Business Days</span>
        </div>
        <span class="price">60 EGP</span>
    </div>

    <div class="rate-card">
        <div class="city-info">
            <span class="city-name">Alexandria</span>
            <span class="days">4-5 Business Days</span>
        </div>
        <span class="price">60 EGP</span>
    </div>

    <p style="color: #777; font-size: 0.9rem; margin: 30px 0;">We’re committed to getting your order to you as fast as possible.</p>

    <div class="contact-box">
        <a href="https://wa.me/201097530461" class="wa-link">
            <i class="fab fa-whatsapp"></i> Chat with us
        </a>
    </div>

    <a href="../main/" class="back-home">← Back to Home</a>
</div>

</body>

</html>
